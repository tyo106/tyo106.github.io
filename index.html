<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warung Digital</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA6gNuDN01l0V6Q6iXNM-3otPZiygTMNNw",
  authDomain: "warung-digital-8fb7b.firebaseapp.com",
  projectId: "warung-digital-8fb7b",
  storageBucket: "warung-digital-8fb7b.firebasestorage.app",
  messagingSenderId: "280805109617",
  appId: "1:280805109617:web:74adc9dc0e7501453e50d0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}
.container {
  max-width: 430px;
  margin: auto;
  min-height: 100vh;
  background: white;
}
.header {
  background: #1f4d2e;
  color: white;
  padding: 20px;
}
.card {
  background: white;
  margin: 12px;
  padding: 16px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.input, button, select {
  width: 100%; padding: 12px; margin-top: 8px;
  border-radius: 8px; border: 1px solid #ddd;
  box-sizing: border-box;
}
button {
  background: #1f7a3f;
  color: white;
  border: none;
  cursor: pointer;
}
button.secondary { background: #e5e7eb; color: #111; }
button.danger { background: #dc2626; }
.hidden { display: none; }
.item {
  border: 1px solid #eee;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
}
.stat {
  font-size: 24px;
  font-weight: bold;
  color: #1f7a3f;
}
.small { font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="container">

  <!-- LOGIN -->
  <div id="loginPage">
    <div class="header">
      <h2>🏪 Warung Digital</h2>
      <p>Masuk dengan akun Google</p>
    </div>
    <div class="card">
      <button onclick="loginGoogle()">🌐 Login dengan Google</button>
    </div>
  </div>

  <!-- APP -->
  <div id="appPage" class="hidden">
    <div class="header">
      <h2>🏪 Warung Digital</h2>
      <div id="userInfo" class="small"></div>
    </div>

    <div class="card">
      <div class="small">Total Omzet</div>
      <div class="stat" id="totalOmzet">Rp 0</div>
      <div class="small" id="totalTrx">0 transaksi</div>
    </div>

    <div class="card">
      <h3>➕ Tambah Stok</h3>
      <input id="stokNama" class="input" placeholder="Nama barang">
      <input id="stokQty" class="input" type="number" placeholder="Jumlah stok">
      <input id="stokHarga" class="input" type="number" placeholder="Harga jual">
      <button onclick="tambahStok()">Simpan Barang</button>
    </div>

    <div class="card">
      <h3>📦 Daftar Stok</h3>
      <div id="stokList"></div>
    </div>

    <div class="card">
      <h3>🛒 Tambah Transaksi</h3>
      <input id="trxNama" class="input" placeholder="Nama pelanggan">
      <select id="trxBarang"></select>
      <input id="trxQty" class="input" type="number" value="1">
      <select id="trxMetode">
        <option>Tunai</option>
        <option>Transfer</option>
        <option>Kasbon</option>
      </select>
      <button onclick="tambahTransaksi()">Simpan Transaksi</button>
    </div>

    <div class="card">
      <h3>🧾 Riwayat Transaksi</h3>
      <div id="trxList"></div>
    </div>

    <div class="card">
      <button class="danger" onclick="logout()">Keluar Akun</button>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let STK = [];
let TRX = [];

function rp(n) {
  return 'Rp ' + Number(n || 0).toLocaleString('id-ID');
}

function saveLocal() {
  localStorage.setItem('wd_stk', JSON.stringify(STK));
  localStorage.setItem('wd_trx', JSON.stringify(TRX));
}

function loadLocal() {
  STK = JSON.parse(localStorage.getItem('wd_stk') || '[]');
  TRX = JSON.parse(localStorage.getItem('wd_trx') || '[]');
}

function syncToFirebase() {
  if (!currentUser) return Promise.resolve();
  return db.collection('users').doc(currentUser.uid).set({
    stok: STK,
    transaksi: TRX,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
}

function loadFromFirebase() {
  if (!currentUser) return Promise.resolve();
  return db.collection('users').doc(currentUser.uid).get().then(doc => {
    if (doc.exists) {
      const data = doc.data();
      STK = data.stok || [];
      TRX = data.transaksi || [];
      saveLocal();
    } else {
      loadLocal();
    }
  });
}

function render() {
  document.getElementById('stokList').innerHTML = STK.map((s, i) => `
    <div class="item">
      <strong>${s.name}</strong><br>
      Stok: ${s.qty} | Harga: ${rp(s.harga)}
      <button class="danger" style="margin-top:8px" onclick="hapusStok(${i})">Hapus</button>
    </div>
  `).join('');

  document.getElementById('trxList').innerHTML = TRX.map((t, i) => `
    <div class="item">
      <strong>${t.name}</strong><br>
      ${t.barang} x ${t.qty}<br>
      ${t.method} — ${rp(t.total)}
      <button class="danger" style="margin-top:8px" onclick="hapusTrx(${i})">Hapus</button>
    </div>
  `).join('');

  document.getElementById('trxBarang').innerHTML = STK.map((s, i) =>
    `<option value="${i}">${s.name}</option>`
  ).join('');

  const omzet = TRX.reduce((sum, t) => sum + t.total, 0);
  document.getElementById('totalOmzet').textContent = rp(omzet);
  document.getElementById('totalTrx').textContent = `${TRX.length} transaksi`;
}

function tambahStok() {
  const name = document.getElementById('stokNama').value.trim();
  const qty = Number(document.getElementById('stokQty').value);
  const harga = Number(document.getElementById('stokHarga').value);

  if (!name) return alert('Nama barang wajib diisi');

  STK.unshift({ name, qty, harga });
  saveLocal();
  syncToFirebase();
  render();

  document.getElementById('stokNama').value = '';
  document.getElementById('stokQty').value = '';
  document.getElementById('stokHarga').value = '';
}

function hapusStok(i) {
  if (!confirm('Hapus barang ini?')) return;
  STK.splice(i, 1);
  saveLocal();
  syncToFirebase();
  render();
}

function tambahTransaksi() {
  if (STK.length === 0) return alert('Tambahkan stok terlebih dahulu');

  const nama = document.getElementById('trxNama').value.trim() || 'Pelanggan';
  const idx = Number(document.getElementById('trxBarang').value);
  const qty = Number(document.getElementById('trxQty').value);
  const method = document.getElementById('trxMetode').value;

  const barang = STK[idx];
  if (!barang) return;
  if (barang.qty < qty) return alert('Stok tidak mencukupi');

  const total = barang.harga * qty;
  barang.qty -= qty;

  TRX.unshift({
    name: nama,
    barang: barang.name,
    qty,
    method,
    total,
    time: new Date().toLocaleString('id-ID')
  });

  saveLocal();
  syncToFirebase();
  render();

  document.getElementById('trxNama').value = '';
}

function hapusTrx(i) {
  if (!confirm('Hapus transaksi ini?')) return;
  TRX.splice(i, 1);
  saveLocal();
  syncToFirebase();
  render();
}

function loginGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .catch(err => alert('Login gagal: ' + err.message));
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(function(user) {
  if (user) {
    currentUser = user;
    document.getElementById('userInfo').textContent = user.displayName + ' (' + user.email + ')';

    loadFromFirebase().then(() => {
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('appPage').classList.remove('hidden');
      render();
    });
  } else {
    currentUser = null;
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('appPage').classList.add('hidden');
  }
});
</script>
</body>
</html>
